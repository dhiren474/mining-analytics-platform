# dashboard/grafana/provisioning/datasources/postgres.yml
apiVersion: 1

datasources:
  - name: MiningPostgres
    type: postgres
    url: postgres:5432
    database: mining_analytics
    user: admin
    secureJsonData:
      password: password123
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: true
